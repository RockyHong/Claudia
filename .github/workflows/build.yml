name: Build Distribution Artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sea-x64:
    name: Build SEA (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build:sea:x64
      - uses: actions/upload-artifact@v4
        with:
          name: sea-x64
          path: dist/claudia-server-x64.exe

  build-sea-x86:
    name: Build SEA (x86)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          architecture: x86
      - run: npm ci
      - run: npm run build:sea:x86
      - uses: actions/upload-artifact@v4
        with:
          name: sea-x86
          path: dist/claudia-server-x86.exe

  build-standalone-win:
    name: Build Standalone (Windows)
    needs: build-sea-x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v4
        with:
          name: sea-x64
          path: src-tauri/binaries/
      - run: |
          mv src-tauri/binaries/claudia-server-x64.exe src-tauri/binaries/claudia-server.exe
      - run: npm ci
      - run: npm run build
      - run: npx tauri build
      # Package the raw exe + sidecar into a zip (no installer)
      - run: |
          mkdir dist-standalone
          cp src-tauri/target/release/Claudia.exe dist-standalone/
          cp src-tauri/binaries/claudia-server.exe dist-standalone/
      - shell: pwsh
        run: Compress-Archive -Path dist-standalone/* -DestinationPath Claudia-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: standalone-win
          path: Claudia-Windows.zip

  build-standalone-mac:
    name: Build Standalone (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build:sea:x64
      - run: |
          mkdir -p src-tauri/binaries
          cp dist/claudia-server-x64 src-tauri/binaries/claudia-server
          chmod +x src-tauri/binaries/claudia-server
      - run: npm run build
      - run: npx tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: standalone-mac
          path: src-tauri/target/release/bundle/dmg/*.dmg

  package-we:
    name: Package Wallpaper Engine
    needs: build-sea-x86
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/download-artifact@v4
        with:
          name: sea-x86
          path: dist/
      - run: node scripts/package-we.js
      - uses: actions/upload-artifact@v4
        with:
          name: we-package
          path: dist/claudia-wallpaper.zip

  release:
    name: Create GitHub Release
    needs: [build-standalone-win, build-standalone-mac, package-we]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/standalone-win/Claudia-Windows.zip
            artifacts/standalone-mac/*.dmg
            artifacts/we-package/claudia-wallpaper.zip
          generate_release_notes: true
