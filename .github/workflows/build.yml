name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build:tauri
      # Portable zip (extract and run, no installer)
      - run: |
          mkdir dist-standalone
          cp src-tauri/target/release/Claudia.exe dist-standalone/
          cp src-tauri/binaries/claudia-server-x86_64-pc-windows-msvc.exe dist-standalone/claudia-server.exe
        shell: bash
      - shell: pwsh
        run: Compress-Archive -Path dist-standalone/* -DestinationPath Claudia-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: standalone-win
          path: |
            Claudia-Windows.zip
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build:tauri
      - uses: actions/upload-artifact@v4
        with:
          name: standalone-mac
          path: src-tauri/target/release/bundle/dmg/*.dmg

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/standalone-win/Claudia-Windows.zip
            artifacts/standalone-win/src-tauri/target/release/bundle/nsis/*.exe
            artifacts/standalone-mac/*.dmg
          generate_release_notes: true
