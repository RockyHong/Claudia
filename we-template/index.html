<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Claudia</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body, iframe { width: 100%; height: 100%; border: none; overflow: hidden; }
  </style>
</head>
<body>
  <iframe id="dashboard" src="http://localhost:48901"></iframe>
  <script>
    // Retry loading if server isn't ready yet
    const iframe = document.getElementById("dashboard");
    let retries = 0;
    iframe.onerror = () => {
      if (retries++ < 30) {
        setTimeout(() => { iframe.src = "http://localhost:48901"; }, 1000);
      }
    };
    // Also handle load failures (iframe won't fire onerror for HTTP errors)
    setTimeout(function check() {
      try {
        // If we can access the iframe content, it loaded
        if (iframe.contentDocument && iframe.contentDocument.body.children.length > 0) return;
      } catch(e) {
        // Cross-origin means it loaded (our server responded)
        return;
      }
      if (retries++ < 30) {
        iframe.src = "http://localhost:48901";
        setTimeout(check, 1000);
      }
    }, 2000);
  </script>
</body>
</html>
